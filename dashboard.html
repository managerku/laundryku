    function saveTemplate(event) { event.preventDefault(); google.script.run.withSuccessHandler(function(response) { if (response && response.success) { clearSessionCachesByPrefixes([LAUNDRYKU_CACHE.SETTINGS]); onSaved(response.message); setTemplateForm({ templateId: "", templateName: "", message: "", active: true }); loadSettings(true); } else onError((response && response.message) || "Gagal menyimpan template."); }).saveMessageTemplate(templateForm); }
    function editTemplate(template) { setTemplateForm(template); setActiveTab("templates"); }
    function toggleTemplate(template) { google.script.run.withSuccessHandler(function(response) { if (response && response.success) { clearSessionCachesByPrefixes([LAUNDRYKU_CACHE.SETTINGS]); onSaved(response.message); loadSettings(true); } else onError((response && response.message) || "Gagal update template."); }).setMessageTemplateActive({ templateId: template.templateId, active: !template.active }); }
    function clearLocalCache() { clearAllLaundrykuCaches(); onSaved("Cache lokal berhasil dibersihkan."); }
    const tabs = [{ id: "profile", label: "Profil Bisnis", icon: "store" }, { id: "payment", label: "Pembayaran", icon: "payments" }, { id: "templates", label: "Template WA", icon: "chat" }, { id: "maintenance", label: "Maintenance", icon: "build" }];
    return <div className="animate-[fadeIn_.35s_ease-out] space-y-6 p-4 lg:p-6"><PageHeader eyebrow="App Configuration" title="Setting" description="Kelola profil bisnis, metode pembayaran, template WhatsApp, dan tools maintenance cache." actionLabel="Reload Settings" actionIcon="refresh" onAction={() => loadSettings(true)} loading={loading} /><div className="flex flex-wrap gap-2 rounded-3xl border border-slate-200 bg-white p-3 shadow-sm">{tabs.map((tab) => <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={"flex items-center gap-2 rounded-2xl px-4 py-3 text-sm font-black transition-all " + (activeTab === tab.id ? "bg-emerald-500 text-white" : "text-slate-500 hover:bg-slate-50")}><span className="material-symbols-outlined text-[20px]">{tab.icon}</span>{tab.label}</button>)}</div>{activeTab === "profile" && <form onSubmit={saveProfile} className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm"><div className="grid grid-cols-1 gap-4 md:grid-cols-2"><FormField label="Nama Bisnis"><input className="form-input" value={settings.businessName || ""} onChange={(e) => updateSetting("businessName", e.target.value)} /></FormField><FormField label="Brand Aplikasi"><input className="form-input" value={settings.businessBrand || ""} onChange={(e) => updateSetting("businessBrand", e.target.value)} /></FormField><FormField label="WhatsApp"><input className="form-input" value={settings.businessWhatsapp || ""} onChange={(e) => updateSetting("businessWhatsapp", e.target.value)} /></FormField><FormField label="Email"><input className="form-input" value={settings.businessEmail || ""} onChange={(e) => updateSetting("businessEmail", e.target.value)} /></FormField><div className="md:col-span-2"><FormField label="Alamat"><textarea className="form-input min-h-[90px] resize-none" value={settings.businessAddress || ""} onChange={(e) => updateSetting("businessAddress", e.target.value)}></textarea></FormField></div><FormField label="Logo URL"><input className="form-input" value={settings.logoUrl || ""} onChange={(e) => updateSetting("logoUrl", e.target.value)} /></FormField><FormField label="Default Payment"><select className="form-input" value={settings.defaultPaymentMethod || "Cash"} onChange={(e) => updateSetting("defaultPaymentMethod", e.target.value)}>{paymentMethods.filter((m) => m.active).map((m) => <option key={m.name}>{m.name}</option>)}</select></FormField><div className="md:col-span-2"><FormField label="Footer Struk"><textarea className="form-input min-h-[80px] resize-none" value={settings.receiptFooter || ""} onChange={(e) => updateSetting("receiptFooter", e.target.value)}></textarea></FormField></div></div><div className="mt-6 flex justify-end"><button disabled={saving} className="rounded-xl bg-emerald-500 px-5 py-3 text-sm font-black text-white">{saving ? "Menyimpan..." : "Simpan Profil"}</button></div></form>}{activeTab === "payment" && <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm"><div className="mb-5 flex gap-3"><input className="form-input" value={newPaymentMethod} onChange={(e) => setNewPaymentMethod(e.target.value)} placeholder="Metode baru" /><button onClick={addPaymentMethod} className="rounded-xl bg-emerald-500 px-5 py-3 text-sm font-black text-white">Tambah</button></div><div className="space-y-3">{paymentMethods.map((method) => <div key={method.name} className="flex items-center justify-between rounded-2xl bg-slate-50 p-4"><div><p className="font-black text-slate-800">{method.name}</p><p className="text-xs font-bold text-slate-400">{method.active ? "Aktif" : "Nonaktif"}</p></div><button onClick={() => togglePaymentMethod(method)} className="rounded-lg border border-slate-200 px-3 py-2 text-xs font-black text-slate-500">{method.active ? "Nonaktifkan" : "Aktifkan"}</button></div>)}</div></div>}{activeTab === "templates" && <div className="grid grid-cols-1 gap-6 lg:grid-cols-2"><form onSubmit={saveTemplate} className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">   }

  function PageHeader({ eyebrow, title, description, actionLabel, actionIcon, onAction, loading, onRefresh }) {
    return <div className="flex flex-col justify-between gap-4 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm lg:flex-row lg:items-center"><div><p className="text-xs font-black uppercase tracking-widest text-emerald-500">{eyebrow}</p><h2 className="mt-1 text-2xl font-black text-slate-800">{title}</h2><p className="mt-1 text-sm font-medium text-slate-500">{description}</p></div><div className="flex flex-wrap gap-3">{onRefresh && <button onClick={onRefresh} className="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-black text-slate-600">Refresh</button>}<button onClick={onAction} className="flex items-center gap-2 rounded-xl bg-emerald-500 px-4 py-3 text-sm font-black text-white"><span className={"material-symbols-outlined text-[20px] " + (loading ? "spin" : "")}>{loading ? "progress_activity" : actionIcon}</span>{actionLabel}</button></div></div>;

  function SimpleBars({ title, data, valueKey, formatCurrency }) {
    const max = (data || []).reduce((m, item) => Math.max(m, Number(item[valueKey] || 0)), 0);
    return <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm"><h3 className="mb-5 font-black text-slate-800">{title}</h3><div className="flex h-56 items-end gap-3 rounded-2xl bg-slate-50 p-5">{(data || []).map((item) => { const value = Number(item[valueKey] || 0); const h = max > 0 ? Math.max(value / max * 100, value > 0 ? 8 : 3) : 3; return <div key={item.key || item.label} className="flex flex-1 flex-col items-center gap-2"><span className="text-[10px] font-black text-slate-400">{value ? formatCurrency(value).replace("Rp ", "") : "0"}</span><div className="flex h-36 w-full items-end rounded-xl bg-white p-2 shadow-inner"><div className="w-full rounded-t-lg bg-emerald-500" style={{height: h + "%"}}></div></div><span className="text-[10px] font-black text-slate-500">{item.label}</span></div>; })}</div></div>;
  }

  function SimpleDualBars({ title, data, formatCurrency }) {
    const max = (data || []).reduce((m, item) => Math.max(m, Number(item.income || 0), Number(item.expense || 0)), 0);
    return <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm"><h3 className="mb-5 font-black text-slate-800">{title}</h3><div className="flex h-64 items-end gap-3 rounded-2xl bg-slate-50 p-5">{(data || []).map((item) => { const ih = max > 0 ? Math.max(Number(item.income || 0) / max * 100, item.income ? 8 : 3) : 3; const eh = max > 0 ? Math.max(Number(item.expense || 0) / max * 100, item.expense ? 8 : 3) : 3; return <div key={item.key || item.label} className="flex flex-1 flex-col items-center gap-2"><div className="flex h-44 w-full items-end gap-1 rounded-xl bg-white p-2 shadow-inner"><div title={formatCurrency(item.income)} className="w-1/2 rounded-t-lg bg-emerald-500" style={{height: ih + "%"}}></div><div title={formatCurrency(item.expense)} className="w-1/2 rounded-t-lg bg-orange-400" style={{height: eh + "%"}}></div></div><span className="text-[10px] font-black text-slate-500">{item.label}</span></div>; })}</div></div>;
  }

  function RankCard({ title, items, nameKey, valueKey, subKey, subSuffix, formatCurrency }) {

<script type="text/babel">
  function LaundrykuDashboardBootstrap() {
    const [session, setSession] = React.useState(function() {
      return laundrykuReadSession();
    });

    React.useEffect(function() {
      if (!session || !session.user || !session.token) {
        window.location.href = laundrykuGetIndexUrl();
      }
    }, [session]);

    if (!session || !session.user || !session.token) {
      return (
        <main className="flex min-h-screen items-center justify-center bg-slate-50 px-4 text-center">
          <div className="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
            <span className="material-symbols-outlined spin text-[36px] text-emerald-500">progress_activity</span>
            <p className="mt-3 text-sm font-black text-slate-600">Mengecek session...</p>
          </div>
        </main>
      );
    }

    return (
      <DashboardApp
        user={session.user}
        onLogout={function() {
          laundrykuCallApi("logout", { token: session.token }).catch(function() {});
          laundrykuClearSession();
          setSession(null);
          window.location.href = laundrykuGetIndexUrl();
        }}
      />
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<LaundrykuDashboardBootstrap />);
</script>
