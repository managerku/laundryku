<script>
  /**
   * IMPORTANT:
   * Replace this with your deployed Google Apps Script Web App /exec URL.
   * Keep this value the same as the API_URL in index.html.
   */
  window.LAUNDRYKU_API_URL = "https://script.google.com/macros/s/AKfycbz4XqUE-QXlmBEWw_x5MTWJNbemSYzdT_rHSHhue-2f_GOV5sl3iiGjUKAqP8981eaUrg/exec";

  window.LAUNDRYKU_SESSION_KEY = "laundryku_user_session";
  window.LAUNDRYKU_TOKEN_KEY = "laundryku_session_token";
  window.LAUNDRYKU_ACTIVE_PAGE_KEY = "laundryku_active_page";
  window.LAUNDRYKU_INDEX_PAGE = "index.html";

  function laundrykuIsApiConfigured() {
    return Boolean(
      window.LAUNDRYKU_API_URL &&
      window.LAUNDRYKU_API_URL.indexOf("https://script.google.com/macros/s/") === 0 &&
      window.LAUNDRYKU_API_URL.indexOf("/exec") > -1
    );
  }

  function laundrykuReadSession() {
    try {
      var rawSession = localStorage.getItem(window.LAUNDRYKU_SESSION_KEY);
      if (!rawSession) return null;

      var session = JSON.parse(rawSession);
      if (!session || !session.user || !session.token) return null;

      if (session.expiresAt && new Date(session.expiresAt).getTime() <= Date.now()) {
        laundrykuClearSession();
        return null;
      }

      return session;
    } catch (error) {
      laundrykuClearSession();
      return null;
    }
  }

  function laundrykuClearSession() {
    try {
      localStorage.removeItem(window.LAUNDRYKU_SESSION_KEY);
      localStorage.removeItem(window.LAUNDRYKU_TOKEN_KEY);
      localStorage.removeItem(window.LAUNDRYKU_ACTIVE_PAGE_KEY);
      Object.keys(sessionStorage).forEach(function(key) {
        if (key.indexOf("laundryku_") === 0) sessionStorage.removeItem(key);
      });
    } catch (error) {}
  }

  function laundrykuGetIndexUrl() {
    var path = window.location.pathname || "/";
    var fileNamePattern = /\/[^/]*\.html$/i;
    var basePath = fileNamePattern.test(path) ? path.replace(fileNamePattern, "/") : (path.endsWith("/") ? path : path + "/");
    return basePath + window.LAUNDRYKU_INDEX_PAGE;
  }

  async function laundrykuCallApi(action, payload) {
    if (!laundrykuIsApiConfigured()) {
      throw new Error("API_URL belum diisi. Paste URL Web App GAS /exec ke file dashboard.html.");
    }

    var session = laundrykuReadSession();
    var requestBody = Object.assign({}, payload || {}, {
      action: action,
      token: session && session.token ? session.token : localStorage.getItem(window.LAUNDRYKU_TOKEN_KEY)
    });

    var response = await fetch(window.LAUNDRYKU_API_URL, {
      method: "POST",
      body: JSON.stringify(requestBody),
      redirect: "follow"
    });

    var text = await response.text();
    if (!text) throw new Error("Server tidak mengembalikan response.");

    var data;
    try {
      data = JSON.parse(text);
    } catch (error) {
      throw new Error("Response server bukan JSON valid. Pastikan GAS sudah dideploy sebagai Web App API.");
    }

    if (data && data.success === false && /session|token|login/i.test(String(data.message || ""))) {
      laundrykuClearSession();
      window.location.href = laundrykuGetIndexUrl();
      return data;
    }

    return data;
  }

  function createGoogleScriptRunShim() {
    var successHandler = null;
    var failureHandler = null;
    var proxy = null;

    function resetHandlers() {
      successHandler = null;
      failureHandler = null;
    }

    proxy = new Proxy({}, {
      get: function(_target, prop) {
        if (prop === "withSuccessHandler") {
          return function(callback) {
            successHandler = callback;
            return proxy;
          };
        }

        if (prop === "withFailureHandler") {
          return function(callback) {
            failureHandler = callback;
            return proxy;
          };
        }

        return function(payload) {
          var onSuccess = successHandler;
          var onFailure = failureHandler;
          resetHandlers();

          laundrykuCallApi(String(prop), payload || {})
            .then(function(result) {
              if (typeof onSuccess === "function") onSuccess(result);
            })
            .catch(function(error) {
              if (typeof onFailure === "function") {
                onFailure(error);
              } else {
                console.error(error);
              }
            });

          return proxy;
        };
      }
    });

    return proxy;
  }

  window.google = window.google || {};
  window.google.script = window.google.script || {};
  window.google.script.run = createGoogleScriptRunShim();
</script>
<script type="text/babel">
  const LAUNDRYKU_CACHE = {
    DASHBOARD: "laundryku_dashboard_cache",
    SERVICES_PAGE: "laundryku_services_page_cache",
    EXPENSE: "laundryku_expense_cache",
    REPORT: "laundryku_report_cache",
    SETTINGS: "laundryku_settings_cache",
    DATA_ORDER: "laundryku_data_order_cache",
    CUSTOMER: "laundryku_customer_cache"
  };

  function readSessionCache(key) {
    try {
      const raw = sessionStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (error) {
      sessionStorage.removeItem(key);
      return null;
    }
  }

  function writeSessionCache(key, value) {
    try {
      sessionStorage.setItem(key, JSON.stringify(value));
    } catch (error) {
      // Storage can fail in private mode or when quota is full. App still works without cache.
    }
  }

  function clearSessionCachesByPrefixes(prefixes) {
    const safePrefixes = prefixes || [];
    Object.keys(sessionStorage).forEach(function(key) {
      if (safePrefixes.some(function(prefix) { return key.indexOf(prefix) === 0; })) {
        sessionStorage.removeItem(key);
      }
    });
  }

  function clearAllLaundrykuCaches() {
    localStorage.removeItem("laundryku_service_catalog_cache");
    Object.keys(sessionStorage).forEach(function(key) {
      if (key.indexOf("laundryku_") === 0) {
        sessionStorage.removeItem(key);
      }
    });
  }

  function buildOrderServiceSummaryFromPayload(payload) {
    var items = (payload && payload.items) || [];

    if (!items.length) {
      return "-";
    }

    return items.map(function(item) {
      var serviceName = item.serviceName || item.name || item.serviceId || "Layanan";
      var qty = Number(item.qty || 0);
      var unit = item.unit || "unit";
      return serviceName + " (" + qty + " " + unit + ")";
    }).join(", ");
  }

  function calculateOrderTotalsFromPayload(payload) {
    var items = (payload && payload.items) || [];
    var subtotal = items.reduce(function(total, item) {
      return total + Number(item.price || 0) * Number(item.qty || 0);
    }, 0);
    var discount = Number((payload && payload.discount) || 0);
    var additionalFee = Number((payload && payload.additionalFee) || 0);
    var paidAmount = Number((payload && payload.paidAmount) || 0);
    var grandTotal = subtotal - discount + additionalFee;
    var remainingAmount = grandTotal - paidAmount;

    return {
      subtotal: subtotal,
      discount: discount,
      additionalFee: additionalFee,
      grandTotal: grandTotal,
      paidAmount: paidAmount,
      remainingAmount: remainingAmount
    };
  }

  function buildOptimisticOrderFromPayload(payload) {
    var now = new Date();
    var totals = calculateOrderTotalsFromPayload(payload || {});
    var tempKey = "TMP-" + now.getTime() + "-" + Math.floor(Math.random() * 100000);

    return {
      tempKey: tempKey,
      orderId: "SYNCING...",
      orderType: String((payload && payload.orderType) || "new"),
      customerName: String((payload && payload.customerName) || "").trim(),
      whatsapp: String((payload && payload.whatsapp) || "").trim(),
      address: String((payload && payload.address) || "").trim(),
      status: "Baru",
      paymentStatus: String((payload && payload.paymentStatus) || "Belum Dibayar"),
      paymentMethod: String((payload && payload.paymentMethod) || "Cash"),
      subtotal: totals.subtotal,
      discount: totals.discount,
      additionalFee: totals.additionalFee,
      grandTotal: totals.grandTotal,
      paidAmount: totals.paidAmount,
      remainingAmount: totals.remainingAmount,
      estimatedFinish: String((payload && payload.estimatedFinish) || "").trim(),
      notes: String((payload && payload.notes) || "").trim(),
      createdBy: String((payload && payload.createdBy) || "Administrator"),
      serviceSummary: buildOrderServiceSummaryFromPayload(payload || {}),
      createdAt: "Baru saja",
      createdAtSort: now.getTime(),
      syncStatus: "pending",
      syncMessage: "Menyinkronkan ke Google Sheets...",
      originalPayload: payload || {}
    };
  }

  function normalizeSavedOrderResponse(response, fallbackOrder) {
    var order = response && response.order ? response.order : null;

    if (!order) {
      order = Object.assign({}, fallbackOrder || {}, {
        orderId: response && response.orderId ? response.orderId : (fallbackOrder && fallbackOrder.orderId ? fallbackOrder.orderId : "-"),
        grandTotal: response && response.grandTotal !== undefined ? response.grandTotal : (fallbackOrder && fallbackOrder.grandTotal),
        remainingAmount: response && response.remainingAmount !== undefined ? response.remainingAmount : (fallbackOrder && fallbackOrder.remainingAmount)
      });
    }

    return Object.assign({}, fallbackOrder || {}, order, {
      syncStatus: "synced",
      syncMessage: "Tersimpan di Google Sheets",
      originalPayload: fallbackOrder && fallbackOrder.originalPayload ? fallbackOrder.originalPayload : null
    });
  }

  function mergePendingOrdersWithFetchedOrders(pendingOrders, fetchedOrders) {
    var merged = [];
    var seen = {};

    (pendingOrders || []).forEach(function(order) {
      if (!order) return;
      var key = String(order.orderId || order.tempKey || "");
      if (key && !seen[key]) {
        merged.push(order);
        seen[key] = true;
      }
    });

    (fetchedOrders || []).forEach(function(order) {
      if (!order) return;
      var key = String(order.orderId || order.tempKey || "");
      if (key && seen[key]) return;
      merged.push(order);
      if (key) seen[key] = true;
    });

    return merged;
  }

    function getPageMeta(page) {
      const map = {
        Dashboard: { title: "Dashboard", subtitle: "Ringkasan performa laundry hari ini." },
        "Order Baru": { title: "Order Baru", subtitle: "Input order dan layanan customer." },

        Setting: { title: "Setting", subtitle: "Profil bisnis, pembayaran, template WhatsApp, dan cache." }
      };

      return map[page] || { title: page, subtitle: "Kelola modul " + page + "." };
    }

    function loadHeaderNotification() {
      if (typeof google === "undefined" || !google.script || !google.script.run) {
        return;
      }

      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success) {
            setNotificationSummary({
              totalOrders: Number(response.totalOrders || 0),
              notFinishedOrders: Number(response.notFinishedOrders || 0),
              unpaidOrders: Number(response.unpaidOrders || 0),
              readyToPickupOrders: Number(response.readyToPickupOrders || 0),
              attentionOrders: Number(response.attentionOrders || 0),
              latestAttentionOrders: response.latestAttentionOrders || []
            });
          }
        })
        .withFailureHandler(function() {})
        .getHeaderNotificationSummary();
    }

    function loadServiceCatalog(forceRefresh) {
      if (!forceRefresh) {
        try {
          const cachedServices = localStorage.getItem(SERVICE_CACHE_KEY);

          if (cachedServices) {
            const parsedServices = JSON.parse(cachedServices);

            if (parsedServices && parsedServices.length) {
              setServices(parsedServices);
              return;
            }
          }
        } catch (error) {
          localStorage.removeItem(SERVICE_CACHE_KEY);
        }
      }

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        setServices(fallbackServices);
        return;
      }

      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success && response.services && response.services.length) {
            setServices(response.services);
            localStorage.setItem(SERVICE_CACHE_KEY, JSON.stringify(response.services));
          } else {
            setServices(fallbackServices);
          }
        })
        .withFailureHandler(function() {
          setServices(fallbackServices);
        })
        .getServiceCatalog();
    }

      clearSessionCachesByPrefixes([
        LAUNDRYKU_CACHE.DASHBOARD,
        LAUNDRYKU_CACHE.DATA_ORDER,
        LAUNDRYKU_CACHE.CUSTOMER,

      var messageOrderId = response && response.orderId ? response.orderId : "order";
      showToast("success", "Order berhasil disimpan: " + messageOrderId);
      setPrefillOrder(null);

      clearTableCaches();

      if (tempKey) {
        setPendingOrders(function(currentOrders) {
          return currentOrders.map(function(order) {
            if (order.tempKey !== tempKey) return order;
            return normalizeSavedOrderResponse(response, order);
          });
        });
      }

      setCustomerRefreshKey(function(value) {
        return value + 1;
      });

      loadHeaderNotification();

      setTimeout(function() {
        setDataOrderRefreshKey(function(value) {
          return value + 1;
        });
      }, 1200);

      setActivePage("Data Order");
    }

    function handleOrderSaveFailed(tempKey, errorMessage) {
      setPendingOrders(function(currentOrders) {
        return currentOrders.map(function(order) {
          if (order.tempKey !== tempKey) return order;
          return Object.assign({}, order, {
            syncStatus: "failed",
            syncMessage: errorMessage || "Gagal menyimpan ke Google Sheets."
          });
        });
      });

      showToast("error", errorMessage || "Gagal menyimpan order.");
      setActivePage("Data Order");
    }

    function handleOrderSubmit(payload) {
      if (typeof google === "undefined" || !google.script || !google.script.run) {
        showToast("error", "google.script.run belum tersedia. Jalankan lewat Web App GAS.");
        return;
      }

      var optimisticOrder = buildOptimisticOrderFromPayload(payload);
      var tempKey = optimisticOrder.tempKey;

      setPendingOrders(function(currentOrders) {
        return [optimisticOrder].concat(currentOrders || []);
      });

      setPrefillOrder(null);
      clearSessionCachesByPrefixes([
        LAUNDRYKU_CACHE.DATA_ORDER,
        LAUNDRYKU_CACHE.DASHBOARD,
        LAUNDRYKU_CACHE.CUSTOMER,
        LAUNDRYKU_CACHE.REPORT

      setActivePage("Data Order");
      showToast("success", "Order sedang disimpan. Kamu bisa lanjut kerja sambil sinkronisasi berjalan.");

      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success) {
            handleOrderSaved(response, tempKey);
          } else {
            handleOrderSaveFailed(tempKey, (response && response.message) || "Gagal menyimpan order.");
          }

        .withFailureHandler(function(error) {
          handleOrderSaveFailed(tempKey, (error && error.message) || "Server error.");
        })
        .saveOrder(payload);

    function getStatusClass(status) {
      if (status === "Baru") return "bg-slate-100 text-slate-500";
      if (status === "Diproses") return "bg-blue-50 text-blue-500";
      if (status === "Selesai") return "bg-green-50 text-emerald-600";
      if (status === "Diambil") return "bg-lime-50 text-lime-600";
      return "bg-slate-100 text-slate-500";
    }

    function getPaymentClass(payment) {
      if (payment === "Lunas") return "bg-green-50 text-emerald-600";
      if (String(payment).indexOf("DP") >= 0) return "bg-orange-50 text-orange-500";

  function DashboardContent({ services, createdBy, getStatusClass, getPaymentClass, onQuickSave, onRepeatOrder, onOpenDataOrder }) {
    const [dashboard, setDashboard] = React.useState({
      stats: {
        todayOrders: 0,
        todayRevenue: 0,
        processOrders: 0,
        readyOrders: 0,
        monthRevenue: 0,
        totalPaidMonth: 0,
        totalRemaining: 0,
        totalCustomers: 0,
        totalOrders: 0
      },
      latestOrders: [],
      topCustomers: [],
      dailySeries: [],
      statusBreakdown: [],
      paymentBreakdown: []
    });
    const [loading, setLoading] = React.useState(false);

    React.useEffect(function() {
      loadDashboard(false);
    }, []);

    function applyDashboardResponse(response) {
      setDashboard({
        stats: response.stats || dashboard.stats,
        latestOrders: response.latestOrders || [],
        topCustomers: response.topCustomers || [],
        dailySeries: response.dailySeries || [],
        statusBreakdown: response.statusBreakdown || [],
        paymentBreakdown: response.paymentBreakdown || []
      });
    }

    function loadDashboard(forceRefresh) {
      if (!forceRefresh) {
        const cachedResponse = readSessionCache(LAUNDRYKU_CACHE.DASHBOARD);
        if (cachedResponse && cachedResponse.success) {
          applyDashboardResponse(cachedResponse);
          return;
        }
      }

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        return;
      }

      setLoading(true);

      google.script.run
        .withSuccessHandler(function(response) {
          setLoading(false);
          if (response && response.success) {
            applyDashboardResponse(response);
            writeSessionCache(LAUNDRYKU_CACHE.DASHBOARD, response);
          }
        })
        .withFailureHandler(function() {
          setLoading(false);
        })
        .getDashboardSummary();
    }

    function formatCurrency(value) {
      return "Rp " + Number(value || 0).toLocaleString("id-ID");
    }

    const stats = dashboard.stats || {};

    return (
      <div className="animate-[fadeIn_.35s_ease-out] space-y-6 p-4 lg:p-6">
        <div className="flex flex-col justify-between gap-4 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm lg:flex-row lg:items-center">

            <p className="mt-1 text-sm font-medium text-slate-500">
              Ringkasan order, omzet, piutang, customer, dan performa operasional dari Google Sheets.

          </div>

          <button
            type="button"
            onClick={() => loadDashboard(true)}
            className="flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-black text-slate-600 transition-all duration-300 hover:-translate-y-0.5 hover:bg-slate-50 hover:shadow-md"
          >
            <span className={"material-symbols-outlined text-[20px] " + (loading ? "spin" : "")}>refresh</span>
            Refresh Dashboard
          </button>
        </div>

        <div className="grid grid-cols-1 gap-4 md:grid-cols-4">
          <StatCard icon="shopping_bag" iconClass="bg-green-800" title="Order Hari Ini" value={String(stats.todayOrders || 0)} note="order masuk hari ini" />
          <StatCard icon="payments" iconClass="bg-green-600" title="Omzet Hari Ini" value={formatCurrency(stats.todayRevenue)} note="grand total hari ini" />
          <StatCard icon="inventory_2" iconClass="bg-lime-600" title="Order Diproses" value={String(stats.processOrders || 0)} note="status Diproses" />
          <StatCard icon="check" iconClass="bg-green-500" title="Selesai Siap Ambil" value={String(stats.readyOrders || 0)} note="status Selesai" />
        </div>

        <div className="grid grid-cols-1 gap-4 md:grid-cols-4">
          <StatCard icon="calendar_month" iconClass="bg-emerald-600" title="Omzet Bulan Ini" value={formatCurrency(stats.monthRevenue)} note="berdasarkan Created At" />
          <StatCard icon="account_balance_wallet" iconClass="bg-orange-400" title="Cash Masuk Bulan Ini" value={formatCurrency(stats.totalPaidMonth)} note="paid amount" />
          <StatCard icon="receipt_long" iconClass="bg-red-400" title="Piutang Aktif" value={formatCurrency(stats.totalRemaining)} note="remaining amount" />
          <StatCard icon="groups" iconClass="bg-purple-500" title="Total Customer" value={String(stats.totalCustomers || 0)} note={(stats.totalOrders || 0) + " total order"} />
        </div>

        <div className="grid grid-cols-1 gap-6 lg:grid-cols-3">
          <DashboardTrendCard dailySeries={dashboard.dailySeries} formatCurrency={formatCurrency} />
          <QuickInputCard services={services} createdBy={createdBy} onQuickSave={onQuickSave} />
        </div>

        <div className="grid grid-cols-1 gap-6 lg:grid-cols-4">
          <DashboardLatestOrdersTable
            orders={dashboard.latestOrders}
            getStatusClass={getStatusClass}
            getPaymentClass={getPaymentClass}
            onOpenDataOrder={onOpenDataOrder}
          />

          <div className="space-y-6">
            <DashboardTopCustomersCard customers={dashboard.topCustomers} onRepeatOrder={onRepeatOrder} />
            <DashboardBreakdownCard title="Status Order" items={dashboard.statusBreakdown} />
          </div>
        </div>
      </div>
    );

  function DashboardTrendCard({ dailySeries, formatCurrency }) {
    const maxValue = dailySeries.reduce(function(max, item) {
      return Math.max(max, Number(item.income || 0), Number(item.expense || 0));
    }, 0);

    return (
      <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm lg:col-span-2">
        <div className="mb-6 flex items-center justify-between">
          <div>
            <h3 className="font-black text-slate-800">Income vs Expense</h3>
            <p className="mt-1 text-sm font-medium text-slate-500">7 hari terakhir dari order dan pengeluaran.</p>
          </div>
          <span className="rounded-full bg-green-50 px-3 py-1 text-xs font-black text-emerald-600">Live</span>
        </div>

        <div className="flex h-64 items-end gap-3 rounded-2xl bg-slate-50 p-5">
          {(dailySeries || []).map((item) => {
            const incomeHeight = maxValue > 0 ? Math.max((Number(item.income || 0) / maxValue) * 100, Number(item.income || 0) > 0 ? 8 : 3) : 3;
            const expenseHeight = maxValue > 0 ? Math.max((Number(item.expense || 0) / maxValue) * 100, Number(item.expense || 0) > 0 ? 8 : 3) : 3;

            return (
              <div key={item.key || item.label} className="flex flex-1 flex-col items-center gap-2">
                <div className="flex h-44 w-full items-end justify-center gap-1 rounded-xl bg-white px-2 py-2 shadow-inner">
                  <div title={formatCurrency(item.income)} className="w-1/2 rounded-t-lg bg-emerald-500" style={{ height: incomeHeight + "%" }}></div>
                  <div title={formatCurrency(item.expense)} className="w-1/2 rounded-t-lg bg-orange-400" style={{ height: expenseHeight + "%" }}></div>
                </div>
                <span className="text-[10px] font-black text-slate-500">{item.label}</span>
              </div>
            );
          })}
        </div>

        <div className="mt-4 flex gap-4 text-xs font-black text-slate-500">
          <span className="flex items-center gap-2"><span className="h-3 w-3 rounded-full bg-emerald-500"></span>Income</span>
          <span className="flex items-center gap-2"><span className="h-3 w-3 rounded-full bg-orange-400"></span>Expense</span>
        </div>
      </div>
    );
  }

    const [discount, setDiscount] = React.useState(0);
    const [additionalFee, setAdditionalFee] = React.useState(0);
    const [estimatedFinish, setEstimatedFinish] = React.useState("23 Mei 2024 17:00");
    const [notes, setNotes] = React.useState("");
    const [saving, setSaving] = React.useState(false);
    const [items, setItems] = React.useState(function() {
      if (prefill && prefill.items && prefill.items.length) return prefill.items;
      if (!defaultService) return [];

      return [
        {
          serviceId: defaultService.id,
          category: defaultService.category,
          serviceName: defaultService.name,
          unit: defaultService.unit,
          price: defaultService.price,
          qty: 1
        }
      ];
    });

    React.useEffect(function() {
      if ((!items || !items.length) && services && services.length) {
        const service = services[0];

        setItems([
          {
            serviceId: service.id,
            category: service.category,
            serviceName: service.name,
            unit: service.unit,
            price: service.price,
            qty: 1
          }
        ]);
      }
    }, [services.length]);

    const subtotal = items.reduce(function(total, item) {
      return total + Number(item.price || 0) * Number(item.qty || 0);
    }, 0);

    const grandTotal = subtotal - Number(discount || 0) + Number(additionalFee || 0);
    const remainingAmount = grandTotal - Number(paidAmount || 0);

    let paymentStatus = "Belum Dibayar";

    if (Number(paidAmount || 0) >= grandTotal && grandTotal > 0) {
      paymentStatus = "Lunas";
    }

    if (Number(paidAmount || 0) > 0 && Number(paidAmount || 0) < grandTotal) {

      const nextItems = items.slice();
      const current = Object.assign({}, nextItems[index]);

      if (field === "serviceId") {
        const selectedService = services.find(function(service) {
          return service.id === value;
        });

        if (selectedService) {
          current.serviceId = selectedService.id;
          current.category = selectedService.category;
          current.serviceName = selectedService.name;
          current.unit = selectedService.unit;
          current.price = selectedService.price;
        }
      } else {
        current[field] = value;
      }

      nextItems[index] = current;
      setItems(nextItems);
    }

    function addItem() {
      if (!services.length) return;

      const service = services[0];

      setItems(
        items.concat([
          {
            serviceId: service.id,
            category: service.category,
            serviceName: service.name,
            unit: service.unit,
            price: service.price,
            qty: 1
          }
        ])
      );

        paymentMethod: paymentMethod,

        items: items.map(function(item) {
          return {
            serviceId: item.serviceId,
            category: item.category,
            serviceName: item.serviceName,
            unit: item.unit,
            price: Number(item.price || 0),
            qty: Number(item.qty || 0)

      if (typeof onSubmitOrder === "function") {

          onError("google.script.run belum tersedia. Jalankan lewat Web App GAS.");

        setSaving(true);
        onSubmitOrder(payload);
        return;

        onError("google.script.run belum tersedia. Jalankan lewat Web App GAS.");
        return;

      setSaving(true);

  function DataOrderPage({ refreshKey, pendingOrders, onError, onCreateOrder, onTrackingChanged }) {
    const [orders, setOrders] = React.useState([]);
    const [loading, setLoading] = React.useState(false);
    const [search, setSearch] = React.useState("");
    const [appliedSearch, setAppliedSearch] = React.useState("");
    const [orderType, setOrderType] = React.useState("all");
    const [status, setStatus] = React.useState("all");
    const [paymentStatus, setPaymentStatus] = React.useState("all");
    const [pageSize, setPageSize] = React.useState(10);
    const [page, setPage] = React.useState(1);
    const [totalRows, setTotalRows] = React.useState(0);
    const [totalPages, setTotalPages] = React.useState(1);
    const [updatingOrderId, setUpdatingOrderId] = React.useState("");
    const [settings, setSettings] = React.useState({ businessName: "Laundryku.id" });
    const [messageTemplates, setMessageTemplates] = React.useState([]);

    React.useEffect(function() {
      loadOrders(false);
    }, [page, pageSize, orderType, status, paymentStatus, appliedSearch, refreshKey]);

    React.useEffect(function() {
      loadMessageTemplates(false);
    }, []);

    function getDataOrderCacheKey() {
      return [
        "laundryku_data_order_cache",
        page,
        pageSize,
        appliedSearch,
        orderType,
        status,
        paymentStatus,
        refreshKey
      ].join("_");
    }

    function loadOrders(forceRefresh) {
      const cacheKey = getDataOrderCacheKey();

      if (!forceRefresh) {
        try {
          const cachedResponse = sessionStorage.getItem(cacheKey);

          if (cachedResponse) {
            const parsedResponse = JSON.parse(cachedResponse);

            if (parsedResponse && parsedResponse.success) {
              setOrders(parsedResponse.orders || []);
              setPage(parsedResponse.page || 1);
              setPageSize(parsedResponse.pageSize || 10);
              setTotalRows(parsedResponse.totalRows || 0);
              setTotalPages(parsedResponse.totalPages || 1);
              return;
            }
          }
        } catch (error) {
          sessionStorage.removeItem(cacheKey);
        }
      }

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        onError("google.script.run belum tersedia. Jalankan lewat Web App GAS.");
        return;
      }

      setLoading(true);

      google.script.run
        .withSuccessHandler(function(response) {
          setLoading(false);

          if (response && response.success) {
            setOrders(response.orders || []);
            setPage(response.page || 1);
            setPageSize(response.pageSize || 10);
            setTotalRows(response.totalRows || 0);
            setTotalPages(response.totalPages || 1);

            sessionStorage.setItem(cacheKey, JSON.stringify(response));
          } else {
            onError((response && response.message) || "Gagal mengambil data order.");
          }
        })
        .withFailureHandler(function(error) {
          setLoading(false);
          onError((error && error.message) || "Server error saat mengambil data order.");
        })
        .getOrdersPage({
          page: page,
          pageSize: pageSize,
          search: appliedSearch,
          orderType: orderType,
          status: status,
          paymentStatus: paymentStatus
        });
    }

    function loadMessageTemplates(forceRefresh) {
      const cacheKey = LAUNDRYKU_CACHE.SETTINGS + "_active_templates";

      if (!forceRefresh) {
        const cached = readSessionCache(cacheKey);
        if (cached && cached.success) {
          setSettings(cached.settings || { businessName: "Laundryku.id" });
          setMessageTemplates((cached.messageTemplates || []).filter(function(item) { return item.active !== false; }));
          return;
        }
      }

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        return;
      }

      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success) {
            setSettings(response.settings || { businessName: "Laundryku.id" });
            setMessageTemplates((response.messageTemplates || []).filter(function(item) { return item.active !== false; }));
            writeSessionCache(cacheKey, response);
          }
        })
        .withFailureHandler(function() {})
        .getAppSettings();
    }

    function updateOrderField(order, field, value) {
      if (!order || !order.orderId) return;
      if (field === "status" && value === order.status) return;
      if (field === "paymentStatus" && value === order.paymentStatus) return;

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        onError("google.script.run belum tersedia. Jalankan lewat Web App GAS.");
        return;
      }

      const payload = { orderId: order.orderId };
      payload[field] = value;
      setUpdatingOrderId(order.orderId + "_" + field);

      google.script.run
        .withSuccessHandler(function(response) {
          setUpdatingOrderId("");

          if (response && response.success) {
            clearSessionCachesByPrefixes([
              LAUNDRYKU_CACHE.DATA_ORDER,
              LAUNDRYKU_CACHE.DASHBOARD,
              LAUNDRYKU_CACHE.REPORT
            ]);
            loadOrders(true);
            if (onTrackingChanged) onTrackingChanged(response.message);
          } else {
            onError((response && response.message) || "Gagal memperbarui tracking order.");
          }
        })
        .withFailureHandler(function(error) {
          setUpdatingOrderId("");
          onError((error && error.message) || "Server error saat update tracking order.");
        })
        .updateOrderTracking(payload);
    }

    function normalizeWhatsAppNumber(value) {
      var number = String(value || "").replace(/\D/g, "");
      if (!number) return "";
      if (number.indexOf("0") === 0) return "62" + number.slice(1);
      if (number.indexOf("62") === 0) return number;
      return number;
    }

    function buildWhatsAppMessage(template, order) {
      var text = template && template.message ? template.message : "Halo {customerName}, order {orderId} saat ini berstatus {status}. Total: {grandTotal}. Sisa pembayaran: {remainingAmount}. Terima kasih, {businessName}.";
      var replacements = {
        customerName: order.customerName || "Customer",
        orderId: order.orderId || "-",
        status: order.status || "-",
        paymentStatus: order.paymentStatus || "-",
        estimatedFinish: order.estimatedFinish || "-",
        grandTotal: formatCurrency(order.grandTotal),
        paidAmount: formatCurrency(order.paidAmount),
        remainingAmount: formatCurrency(order.remainingAmount),
        businessName: settings.businessName || "Laundryku.id",
        businessBrand: settings.businessBrand || "Managerku.id",
        serviceSummary: order.serviceSummary || "-"
      };

      Object.keys(replacements).forEach(function(key) {
        text = text.replace(new RegExp("\\{" + key + "\\}", "g"), replacements[key]);
      });

      return text;
    }

    function sendWhatsApp(order, templateId) {
      var number = normalizeWhatsAppNumber(order.whatsapp);
      if (!number) {
        onError("Nomor WhatsApp customer belum valid.");
        return;
      }

      var template = (messageTemplates || []).find(function(item) {
        return item.templateId === templateId;
      }) || (messageTemplates || [])[0];

      var message = buildWhatsAppMessage(template, order);
      window.open("https://wa.me/" + number + "?text=" + encodeURIComponent(message), "_blank");
    }

    function applySearch(event) {

    function formatCurrency(value) {

    function orderTypeLabel(value) {

    function orderTypeClass(value) {

    function goToPage(nextPage) {
      if (nextPage < 1 || nextPage > totalPages || nextPage === page) {
        return;
      }

      setPage(nextPage);
    }

    function getPageNumbers() {
      return buildPageNumbers(page, totalPages);

    const displayOrders = mergePendingOrdersWithFetchedOrders(pendingOrders, orders);
    const pendingVisibleCount = (pendingOrders || []).length;
    const displayedTotalRows = totalRows + pendingVisibleCount;

    return (

</tbody>

  function CustomerPage({ refreshKey, onError, onRepeatOrder }) {
    const [customers, setCustomers] = React.useState([]);

      totalCustomers: 0,
      repeatCustomers: 0,
      newCustomers: 0,
      topCustomerName: "-"
    });
    const [loading, setLoading] = React.useState(false);
    const [search, setSearch] = React.useState("");
    const [appliedSearch, setAppliedSearch] = React.useState("");
    const [customerType, setCustomerType] = React.useState("all");
    const [pageSize, setPageSize] = React.useState(10);
    const [page, setPage] = React.useState(1);
    const [totalRows, setTotalRows] = React.useState(0);
    const [totalPages, setTotalPages] = React.useState(1);

    React.useEffect(function() {
      loadCustomers(false);
    }, [page, pageSize, customerType, appliedSearch, refreshKey]);

    function getCustomerCacheKey() {
      return [
        "laundryku_customer_cache",
        page,
        pageSize,
        appliedSearch,
        customerType,
        refreshKey
      ].join("_");
    }

    function loadCustomers(forceRefresh) {
      const cacheKey = getCustomerCacheKey();

      if (!forceRefresh) {
        try {
          const cachedResponse = sessionStorage.getItem(cacheKey);

          if (cachedResponse) {
            const parsedResponse = JSON.parse(cachedResponse);

            if (parsedResponse && parsedResponse.success) {
              setCustomers(parsedResponse.customers || []);
              setStats(parsedResponse.stats || {
                totalCustomers: 0,
                repeatCustomers: 0,
                newCustomers: 0,
                topCustomerName: "-"
              });
              setPage(parsedResponse.page || 1);
              setPageSize(parsedResponse.pageSize || 10);
              setTotalRows(parsedResponse.totalRows || 0);
              setTotalPages(parsedResponse.totalPages || 1);
              return;
            }
          }
        } catch (error) {
          sessionStorage.removeItem(cacheKey);
        }
      }

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        onError("google.script.run belum tersedia. Jalankan lewat Web App GAS.");
        return;
      }

      setLoading(true);

      google.script.run
        .withSuccessHandler(function(response) {
          setLoading(false);

          if (response && response.success) {
            setCustomers(response.customers || []);
            setStats(response.stats || {
              totalCustomers: 0,
              repeatCustomers: 0,
              newCustomers: 0,
              topCustomerName: "-"
            });
            setPage(response.page || 1);
            setPageSize(response.pageSize || 10);
            setTotalRows(response.totalRows || 0);
            setTotalPages(response.totalPages || 1);

            sessionStorage.setItem(cacheKey, JSON.stringify(response));
          } else {
            onError((response && response.message) || "Gagal mengambil data customer.");
          }
        })
        .withFailureHandler(function(error) {
          setLoading(false);
          onError((error && error.message) || "Server error saat mengambil data customer.");
        })
        .getCustomersPage({
          page: page,
          pageSize: pageSize,
          search: appliedSearch,
          customerType: customerType
        });
    }

    function applySearch(event) {
      if (event && event.preventDefault) {
        event.preventDefault();
      }

      setPage(1);
      setAppliedSearch(search.trim());
    }

    function resetFilters() {
      setSearch("");
      setAppliedSearch("");
      setCustomerType("all");
      setPageSize(10);
      setPage(1);
    }

    function goToPage(nextPage) {
      if (nextPage < 1 || nextPage > totalPages || nextPage === page) {
        return;
      }

      setPage(nextPage);
    }

    function getPageNumbers() {
      return buildPageNumbers(page, totalPages);
    }

    function getCustomerTypeLabel(totalOrders) {
      return Number(totalOrders || 0) > 1 ? "Repeat" : "New";
    }

    function getCustomerTypeClass(totalOrders) {
      return Number(totalOrders || 0) > 1
        ? "bg-purple-50 text-purple-600"
        : "bg-emerald-50 text-emerald-600";
    }

    function openWhatsApp(whatsapp) {
      var normalized = normalizeWhatsAppNumber(whatsapp);

      if (!normalized) {
        onError("Nomor WhatsApp customer belum valid.");
        return;
      }

      window.open("https://wa.me/" + normalized, "_blank");
    }

    function normalizeWhatsAppNumber(value) {
      var number = String(value || "").replace(/\D/g, "");

      if (!number) return "";

      if (number.indexOf("0") === 0) {
        return "62" + number.slice(1);
      }

      if (number.indexOf("62") === 0) {
        return number;
      }

      return number;
    }

    const firstRow = totalRows === 0 ? 0 : (page - 1) * pageSize + 1;
    const lastRow = Math.min(page * pageSize, totalRows);

    return (
      <div className="animate-[fadeIn_.35s_ease-out] space-y-6 p-4 lg:p-6">

              Customer

            >

        <div className="grid grid-cols-1 gap-4 md:grid-cols-4">

          <StatCard icon="repeat" iconClass="bg-purple-500" title="Repeat Customer" value={String(stats.repeatCustomers || 0)} note="lebih dari 1 order" />
          <StatCard icon="person_add" iconClass="bg-lime-600" title="New Customer" value={String(stats.newCustomers || 0)} note="baru 1 kali order" />
          <StatCard icon="workspace_premium" iconClass="bg-orange-400" title="Top Customer" value={stats.topCustomerName || "-"} note="order terbanyak" />

        <div className="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">

            <form onSubmit={applySearch} className="relative">

  function buildPageNumbers(page, totalPages) {
    var pages = [];

    if (totalPages <= 5) {
      for (var i = 1; i <= totalPages; i++) {
        pages.push(i);
      }

      return pages;
    }

    var start = Math.max(page - 2, 1);
    var end = Math.min(start + 4, totalPages);

    if (end - start < 4) {
      start = Math.max(end - 4, 1);
    }

    for (var j = start; j <= end; j++) {
      pages.push(j);
    }

    return pages;
  }

  function getInitials(name) {
    return String(name || "C")
      .split(" ")
      .filter(Boolean)
      .slice(0, 2)
      .map(function(part) {
        return part.charAt(0).toUpperCase();
      })
      .join("");
  }

          Page {page} dari {totalPages}
        </p>

        <div className="flex flex-wrap items-center gap-2">
          <button
            type="button"
            disabled={page <= 1}
            onClick={() => goToPage(page - 1)}
            className="pagination-control"
          >
            <span className="material-symbols-outlined text-[18px]">chevron_left</span>
          </button>

          {pageNumbers[0] > 1 && (
            <>
              <button
                type="button"

                className="flex h-8 w-8 items-center justify-center rounded-lg border border-slate-200 bg-white text-xs font-black text-slate-600 transition-all duration-300 hover:bg-slate-50"
              >

              <span className="px-1 text-xs font-black text-slate-400">...</span>
            </>
          )}

          {pageNumbers.map(function(pageNumber) {

              <button
                key={pageNumber}

                onClick={() => goToPage(pageNumber)}
                className={
                  "flex h-8 w-8 items-center justify-center rounded-lg text-xs font-black transition-all duration-300 " +
                  (page === pageNumber
                    ? "bg-emerald-500 text-white"
                    : "border border-slate-200 bg-white text-slate-600 hover:bg-slate-50")

          {pageNumbers[pageNumbers.length - 1] < totalPages && (
            <>

              <button
                type="button"
                onClick={() => goToPage(totalPages)}

            <span className="material-symbols-outlined text-[18px]">chevron_right</span>
          </button>
        </div>
      </div>
    );
  }

    const [stats, setStats] = React.useState({
      totalServices: 0,
      activeServices: 0,
      inactiveServices: 0,
      totalCategories: 0,
      cheapestName: "-",
      cheapestPrice: 0,
      highestName: "-",
      highestPrice: 0
    });
    const [categories, setCategories] = React.useState([]);
    const [loading, setLoading] = React.useState(false);
    const [saving, setSaving] = React.useState(false);
    const [search, setSearch] = React.useState("");
    const [appliedSearch, setAppliedSearch] = React.useState("");
    const [category, setCategory] = React.useState("all");
    const [status, setStatus] = React.useState("all");
    const [modalOpen, setModalOpen] = React.useState(false);
    const [editingService, setEditingService] = React.useState(null);
    const [form, setForm] = React.useState(emptyForm);

    React.useEffect(function() {
      loadServices(false);
    }, [appliedSearch, category, status]);

    function getServicesCacheKey() {
      return [LAUNDRYKU_CACHE.SERVICES_PAGE, appliedSearch, category, status].join("_");
    }

    function applyServicesResponse(response) {
      setServices(response.services || []);
      setStats(response.stats || stats);
      setCategories(response.categories || []);
    }

    function loadServices(forceRefresh) {
      const cacheKey = getServicesCacheKey();

      if (!forceRefresh) {
        const cachedResponse = readSessionCache(cacheKey);
        if (cachedResponse && cachedResponse.success) {
          applyServicesResponse(cachedResponse);
          return;
        }
      }

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        onError("google.script.run belum tersedia. Jalankan lewat Web App GAS.");
        return;
      }

      setLoading(true);

      google.script.run
        .withSuccessHandler(function(response) {
          setLoading(false);

          if (response && response.success) {
            applyServicesResponse(response);
            writeSessionCache(cacheKey, response);
          } else {
            onError((response && response.message) || "Gagal mengambil data layanan.");
          }
        })
        .withFailureHandler(function(error) {
          setLoading(false);
          onError((error && error.message) || "Server error saat mengambil layanan.");
        })
        .getServicesPage({
          search: appliedSearch,
          category: category,
          status: status
        });
    }

    function applySearch(event) {
      if (event && event.preventDefault) {
        event.preventDefault();
      }

      setAppliedSearch(search.trim());
    }

    function resetFilters() {
      setSearch("");
      setAppliedSearch("");
      setCategory("all");
      setStatus("all");
    }

    function openAddModal() {
      setEditingService(null);
      setForm(emptyForm);
      setModalOpen(true);
    }

    function openEditModal(service) {
      setEditingService(service);
      setForm({
        serviceId: service.id || service.serviceId || "",
        category: service.category || "",
        serviceName: service.name || service.serviceName || "",
        unit: service.unit || "",
        price: Number(service.price || 0),
        active: service.active === true
      });
      setModalOpen(true);
    }

    function updateForm(field, value) {
      setForm(Object.assign({}, form, { [field]: value }));
    }

    function closeModal() {
      if (saving) return;
      setModalOpen(false);
      setEditingService(null);
      setForm(emptyForm);
    }

    function submitService(event) {
      event.preventDefault();

      if (!form.serviceId.trim()) {
        onError("Service ID wajib diisi.");
        return;
      }

      if (!form.category.trim()) {
        onError("Kategori wajib diisi.");
        return;
      }

      if (!form.serviceName.trim()) {
        onError("Nama layanan wajib diisi.");
        return;
      }

      if (!form.unit.trim()) {
        onError("Unit wajib diisi.");
        return;
      }

      if (Number(form.price || 0) < 0) {
        onError("Harga tidak boleh negatif.");
        return;
      }

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        onError("google.script.run belum tersedia. Jalankan lewat Web App GAS.");
        return;
      }

      const payload = {
        serviceId: form.serviceId.trim().toUpperCase(),
        category: form.category.trim(),
        serviceName: form.serviceName.trim(),
        unit: form.unit.trim(),
        price: Number(form.price || 0),
        active: form.active === true
      };

      setSaving(true);

      const runner = google.script.run
        .withSuccessHandler(function(response) {
          setSaving(false);

          if (response && response.success) {
            closeModal();
            clearSessionCachesByPrefixes([LAUNDRYKU_CACHE.SERVICES_PAGE]);
            loadServices(true);
            onServicesChanged(response.message || "Data layanan berhasil diperbarui.");
          } else {
            onError((response && response.message) || "Gagal menyimpan layanan.");
          }
        })
        .withFailureHandler(function(error) {
          setSaving(false);
          onError((error && error.message) || "Server error saat menyimpan layanan.");
        });

      if (editingService) {
        runner.updateService(payload);
      } else {
        runner.saveService(payload);
      }
    }

    function toggleService(service) {
      if (typeof google === "undefined" || !google.script || !google.script.run) {
        onError("google.script.run belum tersedia. Jalankan lewat Web App GAS.");
        return;
      }

      const nextActive = !service.active;
      setLoading(true);

      google.script.run
        .withSuccessHandler(function(response) {
          setLoading(false);

          if (response && response.success) {
            clearSessionCachesByPrefixes([LAUNDRYKU_CACHE.SERVICES_PAGE]);
            loadServices(true);
            onServicesChanged(response.message || "Status layanan berhasil diperbarui.");
          } else {
            onError((response && response.message) || "Gagal mengubah status layanan.");
          }
        })
        .withFailureHandler(function(error) {
          setLoading(false);
          onError((error && error.message) || "Server error saat mengubah status layanan.");
        })
        .setServiceActive({
          serviceId: service.id,
          active: nextActive
        });
    }

    function formatCurrency(value) {
      return "Rp " + Number(value || 0).toLocaleString("id-ID");

    function statusClass(active) {
      return active ? "bg-green-50 text-emerald-600" : "bg-slate-100 text-slate-500";
    }

    return (
      <div className="animate-[fadeIn_.35s_ease-out] space-y-6 p-4 lg:p-6">
        <div className="flex flex-col justify-between gap-4 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm lg:flex-row lg:items-center">
          <div>
            <p className="text-xs font-black uppercase tracking-widest text-emerald-500">
              Master Data
            </p>
            <h2 className="mt-1 text-2xl font-black text-slate-800">
              Layanan & Harga
            </h2>
            <p className="mt-1 text-sm font-medium text-slate-500">
              Kelola katalog layanan dari sheet Services. Harga baru berlaku untuk order baru, sedangkan order lama tetap memakai harga tersimpan.
            </p>
          </div>

          <div className="flex flex-wrap gap-3">
            <button
              type="button"
              onClick={() => loadServices(true)}
              className="flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-black text-slate-600 transition-all duration-300 hover:-translate-y-0.5 hover:bg-slate-50 hover:shadow-md"
            >
              <span className={"material-symbols-outlined text-[20px] " + (loading ? "spin" : "")}>

            <button

            >
              <span className="material-symbols-outlined text-[20px]">add</span>
              Tambah Layanan
            </button>
          </div>
        </div>

        <div className="grid grid-cols-1 gap-4 md:grid-cols-4">
          <StatCard icon="sell" iconClass="bg-emerald-600" title="Total Layanan" value={String(stats.totalServices || 0)} note="semua layanan" />
          <StatCard icon="toggle_on" iconClass="bg-green-600" title="Layanan Aktif" value={String(stats.activeServices || 0)} note="muncul di order" />
          <StatCard icon="toggle_off" iconClass="bg-slate-500" title="Nonaktif" value={String(stats.inactiveServices || 0)} note="disembunyikan" />
          <StatCard icon="category" iconClass="bg-lime-600" title="Kategori" value={String(stats.totalCategories || 0)} note="kategori layanan" />
        </div>

        <div className="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
          <div className="grid grid-cols-1 gap-4 xl:grid-cols-[1fr_180px_160px_auto]">
            <form onSubmit={applySearch} className="relative">

                <span className="material-symbols-outlined text-[20px]">search</span>

              <input

                placeholder="Cari ID, kategori, nama layanan, unit..."
              />
            </form>

            <select
              value={category}
              onChange={(event) => setCategory(event.target.value)}
              className="filter-select"
            >
              <option value="all">Semua Kategori</option>
              {categories.map((item) => (
                <option key={item} value={item}>{item}</option>
              ))}
            </select>

            <select

              onChange={(event) => setStatus(event.target.value)}
              className="filter-select"
            >
              <option value="all">Semua Status</option>
              <option value="active">Aktif</option>
              <option value="inactive">Nonaktif</option>
            </select>

            <div className="flex gap-2">
              <button type="button" onClick={applySearch} className="flex-1 rounded-xl bg-emerald-500 px-4 py-3 text-sm font-black text-white transition-all duration-300 hover:bg-emerald-600">
                Filter
              </button>

              <button type="button" onClick={resetFilters} className="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-black text-slate-500 transition-all duration-300 hover:bg-slate-50">
                Reset
              </button>
            </div>
          </div>
        </div>

        <div className="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
          <div className="flex items-center justify-between border-b border-slate-100 p-5">
            <div>
              <h3 className="font-black text-slate-800">Daftar Layanan</h3>
              <p className="mt-1 text-xs font-bold text-slate-400">
                Menampilkan {services.length} layanan dari Google Sheets
              </p>
            </div>

            {loading && (
              <div className="flex items-center gap-2 rounded-full bg-green-50 px-3 py-1 text-xs font-black text-emerald-600">
                <span className="material-symbols-outlined spin text-[16px]">progress_activity</span>
                Loading
              </div>
            )}
          </div>

          <div className="overflow-x-auto">
            <table className="w-full min-w-[980px] text-left">
              <thead>
                <tr className="bg-slate-50/70 text-[10px] font-black uppercase tracking-widest text-slate-400">
                  <th className="px-5 py-4">Service ID</th>
                  <th className="px-5 py-4">Kategori</th>
                  <th className="px-5 py-4">Nama Layanan</th>
                  <th className="px-5 py-4">Unit</th>
                  <th className="px-5 py-4">Harga</th>
                  <th className="px-5 py-4">Status</th>
                  <th className="px-5 py-4"></th>
                </tr>
              </thead>

              <tbody className="divide-y divide-slate-100">
                {!loading && services.length === 0 && (
                  <tr>
                    <td colSpan="7" className="px-5 py-14 text-center">
                      <div className="mx-auto flex max-w-sm flex-col items-center">
                        <div className="mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-slate-50 text-slate-400">
                          <span className="material-symbols-outlined text-[34px]">sell</span>
                        </div>
                        <p className="font-black text-slate-700">Belum ada data layanan</p>
                        <p className="mt-1 text-sm text-slate-400">Tambah layanan baru atau ubah filter pencarian.</p>
                      </div>
                    </td>
                  </tr>
                )}

                {services.map((service) => (
                  <tr key={service.id} className="group text-sm transition-all duration-300 hover:bg-slate-50">
                    <td className="px-5 py-4 font-black text-emerald-600">{service.id}</td>
                    <td className="px-5 py-4">
                      <span className="rounded-full bg-green-50 px-2.5 py-1 text-[10px] font-black uppercase text-emerald-600">
                        {service.category || "-"}
                      </span>
                    </td>
                    <td className="px-5 py-4">
                      <p className="font-black text-slate-800">{service.name}</p>
                      <p className="mt-1 text-xs font-bold text-slate-400">
                        Berlaku untuk order baru setelah disimpan
                      </p>
                    </td>
                    <td className="px-5 py-4 text-xs font-bold text-slate-500">{service.unit}</td>
                    <td className="px-5 py-4 font-black text-slate-800">{formatCurrency(service.price)}</td>
                    <td className="px-5 py-4">
                      <span className={"rounded-full px-2.5 py-1 text-[10px] font-black uppercase " + statusClass(service.active)}>
                        {service.active ? "Aktif" : "Nonaktif"}
                      </span>
                    </td>
                    <td className="px-5 py-4">
                      <div className="flex items-center gap-2">
                        <button
                          type="button"
                          onClick={() => openEditModal(service)}
                          className="rounded-lg border border-slate-200 px-3 py-2 text-xs font-black text-slate-500 transition-all duration-300 hover:border-emerald-200 hover:bg-green-50 hover:text-emerald-600"
                        >
                          Edit
                        </button>

                        <button
                          type="button"
                          onClick={() => toggleService(service)}
                          className={
                            "rounded-lg border px-3 py-2 text-xs font-black transition-all duration-300 hover:-translate-y-0.5 " +
                            (service.active
                              ? "border-red-100 bg-red-50 text-red-500 hover:bg-red-500 hover:text-white"
                              : "border-emerald-200 bg-green-50 text-emerald-600 hover:bg-emerald-500 hover:text-white")
                          }
                        >
                          {service.active ? "Nonaktifkan" : "Aktifkan"}
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <div className="rounded-3xl border border-emerald-200 bg-green-50 p-5 text-sm font-medium leading-relaxed text-slate-600">
          <p className="font-black text-emerald-700">Catatan harga</p>
          <p className="mt-1">
            Perubahan harga hanya memengaruhi order baru. Order lama tetap aman karena harga layanan sudah disimpan di sheet OrderItems saat order dibuat.
          </p>
        </div>

        {modalOpen && (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 p-4 backdrop-blur-sm">
            <div className="w-full max-w-2xl overflow-hidden rounded-3xl bg-white shadow-2xl animate-[fadeIn_.25s_ease-out]">
              <div className="flex items-center justify-between border-b border-slate-100 p-6">
                <div>
                  <p className="text-xs font-black uppercase tracking-widest text-emerald-500">
                    {editingService ? "Edit Layanan" : "Tambah Layanan"}
                  </p>
                  <h3 className="mt-1 text-xl font-black text-slate-800">
                    {editingService ? form.serviceId : "Layanan Baru"}
                  </h3>
                </div>

                <button
                  type="button"
                  onClick={closeModal}
                  className="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 text-slate-500 transition-all duration-300 hover:bg-slate-50"
                >
                  <span className="material-symbols-outlined text-[20px]">close</span>
                </button>
              </div>

              <form onSubmit={submitService} className="space-y-5 p-6">
                <div className="grid grid-cols-1 gap-4 md:grid-cols-2">
                  <FormField label="Service ID">
                    <input
                      className="form-input uppercase disabled:bg-slate-100 disabled:text-slate-400"
                      value={form.serviceId}
                      onChange={(event) => updateForm("serviceId", event.target.value.toUpperCase())}
                      disabled={!!editingService}
                      placeholder="Contoh: CKL"
                    />
                  </FormField>

                  <FormField label="Kategori">
                    <input
                      className="form-input"
                      value={form.category}
                      onChange={(event) => updateForm("category", event.target.value)}
                      placeholder="Kiloan / Satuan / Express"
                    />
                  </FormField>

                  <FormField label="Nama Layanan">
                    <input
                      className="form-input"
                      value={form.serviceName}
                      onChange={(event) => updateForm("serviceName", event.target.value)}
                      placeholder="Contoh: Cuci Kering Lipat"
                    />
                  </FormField>

                  <FormField label="Unit">
                    <input
                      className="form-input"
                      value={form.unit}
                      onChange={(event) => updateForm("unit", event.target.value)}
                      placeholder="kg / pcs"
                    />
                  </FormField>

                  <FormField label="Harga">
                    <input
                      className="form-input"
                      type="number"
                      min="0"
                      value={form.price}
                      onChange={(event) => updateForm("price", event.target.value)}
                    />
                  </FormField>

                  <FormField label="Status">
                    <select
                      className="form-input"
                      value={form.active ? "active" : "inactive"}
                      onChange={(event) => updateForm("active", event.target.value === "active")}
                    >
                      <option value="active">Aktif</option>
                      <option value="inactive">Nonaktif</option>
                    </select>
                  </FormField>
                </div>

                <div className="rounded-2xl bg-slate-50 p-4 text-sm font-medium text-slate-500">
                  Preview: <span className="font-black text-slate-700">{form.category || "Kategori"} - {form.serviceName || "Nama Layanan"}</span> / <span className="font-black text-emerald-600">{formatCurrency(form.price)} per {form.unit || "unit"}</span>
                </div>

                <div className="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
                  <button
                    type="button"
                    onClick={closeModal}
                    className="rounded-xl border border-slate-200 bg-white px-5 py-3 text-sm font-black text-slate-600 transition-all duration-300 hover:bg-slate-50"
                  >
                    Batal
                  </button>

                  <button
                    type="submit"
                    disabled={saving}
                    className="flex items-center justify-center gap-2 rounded-xl bg-emerald-500 px-5 py-3 text-sm font-black text-white shadow-lg shadow-green-100 transition-all duration-300 hover:-translate-y-0.5 hover:bg-emerald-600 disabled:cursor-not-allowed disabled:opacity-60"
                  >
                    <span className={"material-symbols-outlined text-[20px] " + (saving ? "spin" : "")}>
                      {saving ? "progress_activity" : "save"}
                    </span>
                    {saving ? "Menyimpan..." : "Simpan Layanan"}
                  </button>
                </div>
              </form>
            </div>
          </div>
        )}
      </div>
    );
  }


  function PengeluaranPage({ user, onError, onSaved }) {
    const defaultCategories = ["Sabun & Chemical", "Packaging", "Maintenance", "Sewa Ruko", "Listrik", "Air", "Gaji", "Transport", "Internet / Pulsa", "Lain-lain"];
    const defaultPaymentMethods = ["Cash", "Transfer", "QRIS", "Debit/Kartu", "E-Wallet", "Lainnya"];
    const [expenses, setExpenses] = React.useState([]);
    const [stats, setStats] = React.useState({ totalTransactions: 0, totalAmount: 0, todayAmount: 0, monthAmount: 0, topCategoryName: "-", topCategoryAmount: 0, dailySeries: [], categorySeries: [] });
    const [categories, setCategories] = React.useState(defaultCategories);
    const [paymentMethods, setPaymentMethods] = React.useState(defaultPaymentMethods);
    const [loading, setLoading] = React.useState(false);
    const [search, setSearch] = React.useState("");
    const [appliedSearch, setAppliedSearch] = React.useState("");
    const [category, setCategory] = React.useState("all");
    const [paymentMethod, setPaymentMethod] = React.useState("all");
    const [pageSize, setPageSize] = React.useState(10);
    const [page, setPage] = React.useState(1);
    const [totalRows, setTotalRows] = React.useState(0);
    const [totalPages, setTotalPages] = React.useState(1);
    const [modalOpen, setModalOpen] = React.useState(false);
    const [editingExpense, setEditingExpense] = React.useState(null);
    const [saving, setSaving] = React.useState(false);
    const [form, setForm] = React.useState(getDefaultForm());

    React.useEffect(function() { loadExpenses(false); }, [page, pageSize, category, paymentMethod, appliedSearch]);

    function getTodayInput() {
      const d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    }
    function getDefaultForm() { return { expenseId: "", date: getTodayInput(), category: defaultCategories[0], description: "", amount: "", paymentMethod: defaultPaymentMethods[0], vendor: "", notes: "" }; }
    function mergeOptions(base, dynamic) { const map = {}; return base.concat(dynamic || []).filter((item) => { const value = String(item || "").trim(); if (!value || map[value]) return false; map[value] = true; return true; }); }
    function formatCurrency(value) { return "Rp " + Number(value || 0).toLocaleString("id-ID"); }

    function getExpenseCacheKey() {
      return [LAUNDRYKU_CACHE.EXPENSE, page, pageSize, appliedSearch, category, paymentMethod].join("_");
    }

    function applyExpenseResponse(response) {
      setExpenses(response.expenses || []);
      setStats(response.stats || stats);
      setCategories(mergeOptions(defaultCategories, response.categories || []));
      setPaymentMethods(mergeOptions(defaultPaymentMethods, response.paymentMethods || []));
      setPage(response.page || 1);
      setPageSize(response.pageSize || 10);
      setTotalRows(response.totalRows || 0);
      setTotalPages(response.totalPages || 1);
    }

    function loadExpenses(forceRefresh) {
      const cacheKey = getExpenseCacheKey();
      if (!forceRefresh) {
        const cachedResponse = readSessionCache(cacheKey);
        if (cachedResponse && cachedResponse.success) {
          applyExpenseResponse(cachedResponse);
          return;
        }
      }

      if (typeof google === "undefined" || !google.script || !google.script.run) { onError("google.script.run belum tersedia. Jalankan lewat Web App GAS."); return; }
      setLoading(true);
      google.script.run
        .withSuccessHandler(function(response) {
          setLoading(false);
          if (response && response.success) {
            applyExpenseResponse(response);
            writeSessionCache(cacheKey, response);
          } else { onError((response && response.message) || "Gagal mengambil pengeluaran."); }
        })
        .withFailureHandler(function(error) { setLoading(false); onError((error && error.message) || "Server error."); })
        .getExpensesPage({ page, pageSize, search: appliedSearch, category, paymentMethod });
    }
    function applySearch(event) { if (event && event.preventDefault) event.preventDefault(); setPage(1); setAppliedSearch(search.trim()); }
    function resetFilters() { setSearch(""); setAppliedSearch(""); setCategory("all"); setPaymentMethod("all"); setPageSize(10); setPage(1); }
    function openAddModal() { setEditingExpense(null); setForm(getDefaultForm()); setModalOpen(true); }
    function openEditModal(expense) { setEditingExpense(expense); setForm({ expenseId: expense.expenseId, date: expense.dateInput || getTodayInput(), category: expense.category || "", description: expense.description || "", amount: String(expense.amount || 0), paymentMethod: expense.paymentMethod || defaultPaymentMethods[0], vendor: expense.vendor || "", notes: expense.notes || "" }); setModalOpen(true); }
    function updateForm(field, value) { setForm(Object.assign({}, form, { [field]: value })); }
    function closeModal() { setModalOpen(false); setSaving(false); setEditingExpense(null); setForm(getDefaultForm()); }
    function submitExpense(event) {
      event.preventDefault();
      if (typeof google === "undefined" || !google.script || !google.script.run) { onError("google.script.run belum tersedia."); return; }
      const payload = Object.assign({}, form, { amount: Number(form.amount || 0), createdBy: user && user.name ? user.name : "Administrator" });
      setSaving(true);

      if (editingExpense) runner.updateExpense(payload); else runner.saveExpense(payload);
    }
    function removeExpense(expense) { if (!window.confirm("Hapus pengeluaran " + expense.expenseId + "?")) return; google.script.run.withSuccessHandler(function(response) { if (response && response.success) { clearSessionCachesByPrefixes([LAUNDRYKU_CACHE.EXPENSE]); onSaved(response.message); loadExpenses(true); } else { onError((response && response.message) || "Gagal menghapus."); } }).withFailureHandler(function(error) { onError((error && error.message) || "Server error."); }).deleteExpense({ expenseId: expense.expenseId }); }
    function goToPage(nextPage) { if (nextPage < 1 || nextPage > totalPages || nextPage === page) return; setPage(nextPage); }

  function LaporanPage({ onError }) {

    function loadReport(forceRefresh) { const cacheKey = getReportCacheKey(); if (!forceRefresh) { const cachedResponse = readSessionCache(cacheKey); if (cachedResponse && cachedResponse.success) { setReport(cachedResponse); return; } } if (typeof google === "undefined" || !google.script || !google.script.run) { onError("google.script.run belum tersedia."); return; } setLoading(true); google.script.run.withSuccessHandler(function(response) { setLoading(false); if (response && response.success) { setReport(response); writeSessionCache(cacheKey, response); } else onError((response && response.message) || "Gagal mengambil laporan."); }).withFailureHandler(function(error) { setLoading(false); onError((error && error.message) || "Server error."); }).getReportsSummary({ period, startDate, endDate }); }

cols-1 gap-4 md:grid-cols-3"><StatCard icon="paid" iconClass="bg-green-600" title="Cash Masuk" value={formatCurrency(s.totalPaid)} note="paid amount" /><StatCard icon="hourglass_bottom" iconClass="bg-red-400" title="Belum Dibayar" value={formatCurrency(s.totalRemaining)} note="remaining amount" /><StatCard icon="summarize" iconClass="bg-purple-500" title="Periode" value={(report.range && report.range.label) || "-"} note="filter aktif" /></div><SimpleDualBars title="Income vs Expense" data={report.incomeExpenseSeries || []} formatCurrency={formatCurrency} /><div className="grid grid-cols-1 gap-6 lg:grid-cols-2"><RankCard title="Top Services by Revenue" items={report.topServices || []} nameKey="serviceName" valueKey="revenue" subKey="qty" subSuffix=" qty" formatCurrency={formatCurrency} /><RankCard title="Top Expense Categories" items={report.topExpenseCategories || []} nameKey="category" valueKey="amount" subKey="count" subSuffix=" transaksi" formatCurrency={formatCurrency} /></div><div className="grid grid-cols-1 gap-6 lg:grid-cols-2"><BreakdownList title="Status Order" items={report.orderStatusBreakdown || []} /><BreakdownList title="Status Pembayaran" items={report.paymentStatusBreakdown || []} /></div></div>;

  function SettingsPage({ onError, onSaved }) {

    React.useEffect(function() { loadSettings(false); }, []);
    function applySettingsResponse(response) { setSettings(Object.assign({}, settings, response.settings || {})); setPaymentMethods(response.paymentMethods || []); setTemplates(response.messageTemplates || []); }
    function loadSettings(forceRefresh) { if (!forceRefresh) { const cachedResponse = readSessionCache(LAUNDRYKU_CACHE.SETTINGS); if (cachedResponse && cachedResponse.success) { applySettingsResponse(cachedResponse); return; } } if (typeof google === "undefined" || !google.script || !google.script.run) { onError("google.script.run belum tersedia."); return; } setLoading(true); google.script.run.withSuccessHandler(function(response) { setLoading(false); if (response && response.success) { applySettingsResponse(response); writeSessionCache(LAUNDRYKU_CACHE.SETTINGS, response); } else onError((response && response.message) || "Gagal mengambil settings."); }).withFailureHandler(function(error) { setLoading(false); onError((error && error.message) || "Server error."); }).getAppSettings(); }
    function updateSetting(key, value) { setSettings(Object.assign({}, settings, { [key]: value })); }
    function saveProfile(event) { event.preventDefault(); setSaving(true); google.script.run.withSuccessHandler(function(response) { setSaving(false); if (response && response.success) { clearSessionCachesByPrefixes([LAUNDRYKU_CACHE.SETTINGS]); onSaved(response.message); loadSettings(true); } else onError((response && response.message) || "Gagal menyimpan settings."); }).withFailureHandler(function(error) { setSaving(false); onError((error && error.message) || "Server error."); }).saveBusinessSettings({ settings }); }
    function addPaymentMethod() { if (!newPaymentMethod.trim()) { onError("Nama metode pembayaran wajib diisi."); return; } google.script.run.withSuccessHandler(function(response) { if (response && response.success) { clearSessionCachesByPrefixes([LAUNDRYKU_CACHE.SETTINGS]); onSaved(response.message); setNewPaymentMethod(""); loadSettings(true); } else onError((response && response.message) || "Gagal menyimpan metode."); }).savePaymentMethod({ name: newPaymentMethod.trim(), active: true }); }
    function togglePaymentMethod(method) { google.script.run.withSuccessHandler(function(response) { if (response && response.success) { clearSessionCachesByPrefixes([LAUNDRYKU_CACHE.SETTINGS]); onSaved(response.message); loadSettings(true); } else onError((response && response.message) || "Gagal update metode."); }).setPaymentMethodActive({ name: method.name, active: !method.active }); }
