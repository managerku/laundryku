  <style>
    html,
    body,
    #root {

<body>
  <div id="root"></div>

  <script>
    window.MANAGERKU_CONFIG = {
      clientId: "demo-client",
      apiUrl: "https://script.google.com/macros/s/AKfycbw6FYPQGJwRMm0-GKcGRo3L1HegSUh6elkatZnzDABO2b1129dzOlRN7D1fjMiEMKYE4w/exec",
      frontendVersion: "2026.05.03.1"
    };
  
    function apiCall(action, payload) {
      const apiUrl = window.MANAGERKU_CONFIG && window.MANAGERKU_CONFIG.apiUrl;
  
      if (!apiUrl || apiUrl.indexOf("https://script.google.com/macros/s/") !== 0) {
        return Promise.reject(new Error("GAS Web App API URL belum valid di MANAGERKU_CONFIG.apiUrl."));
      }
  
      return fetch(apiUrl, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          action: action,
          payload: payload || {}
        })
      }).then(function(response) {
        if (!response.ok) {
          throw new Error("HTTP " + response.status + " saat memanggil API.");
        }
        return response.json();
      });
    }


    /**
     * google.script.run compatibility shim.
     * Keeps the existing dashboard code working from GitHub Pages.
     */
    window.google = window.google || {};
    window.google.script = window.google.script || {};

    function createGoogleScriptRunShim(state) {
      const currentState = state || {};

      return new Proxy({}, {
        get: function(_, prop) {
          if (prop === "withSuccessHandler") {
            return function(handler) {
              return createGoogleScriptRunShim(Object.assign({}, currentState, {
                successHandler: handler
              }));
            };
          }

          if (prop === "withFailureHandler") {
            return function(handler) {
              return createGoogleScriptRunShim(Object.assign({}, currentState, {
                failureHandler: handler
              }));
            };
          }

          return function(payload) {
            apiCall(String(prop), payload || {})
              .then(function(response) {
                if (typeof currentState.successHandler === "function") {
                  currentState.successHandler(response);
                }
              })
              .catch(function(error) {
                if (typeof currentState.failureHandler === "function") {
                  currentState.failureHandler(error);
                } else {
                  console.error(error);
                }
              });
          };
        }
      });
    }

    window.google.script.run = createGoogleScriptRunShim();
  </script>

  <script type="text/babel" src="./dashboard.html?v=20260503-1"></script>

  <script type="text/babel">
    const { useEffect, useState } = React;

    const SESSION_KEY = "laundryku_user_session";
    const USERNAME_KEY = "laundryku_username";
    const ACTIVE_PAGE_KEY = "laundryku_active_page";
    const SESSION_EXPIRES_MS = 1000 * 60 * 60 * 12; // 12 hours

    function getSavedSession() {
      try {
        const rawSession = localStorage.getItem(SESSION_KEY);

        if (!rawSession) {
          return null;
        }

        const session = JSON.parse(rawSession);

        if (!session || !session.user || !session.savedAt) {
          localStorage.removeItem(SESSION_KEY);
          return null;
        }

        const isExpired = Date.now() - Number(session.savedAt) > SESSION_EXPIRES_MS;

        if (isExpired) {
          localStorage.removeItem(SESSION_KEY);
          return null;
        }

        return session.user;

      } catch (error) {
        localStorage.removeItem(SESSION_KEY);
        return null;
      }
    }

    function saveSession(user) {
      try {
        localStorage.setItem(
          SESSION_KEY,
          JSON.stringify({
            user: user,
            savedAt: Date.now()
          })
        );
      } catch (error) {
        console.warn("Unable to save session:", error);
      }
    }

    function clearSession() {
      try {
        localStorage.removeItem(SESSION_KEY);
        localStorage.removeItem(ACTIVE_PAGE_KEY);

        Object.keys(sessionStorage).forEach(function(key) {
          if (
            key.indexOf("laundryku_data_order_cache") === 0 ||
            key.indexOf("laundryku_customer_cache") === 0
          ) {
            sessionStorage.removeItem(key);
          }
        });
      } catch (error) {
        console.warn("Unable to clear session:", error);
      }
    }

    function LoginApp() {
      const savedSession = getSavedSession();

      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [remember, setRemember] = useState(false);
      const [showPassword, setShowPassword] = useState(false);
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState("");
      const [messageType, setMessageType] = useState("");
      const [currentPage, setCurrentPage] = useState(savedSession ? "dashboard" : "login");
      const [loggedInUser, setLoggedInUser] = useState(savedSession);

      useEffect(() => {
        const savedUsername = localStorage.getItem(USERNAME_KEY);

        if (savedUsername) {
          setUsername(savedUsername);
          setRemember(true);
        }
      }, []);

      function handleSubmit(event) {
        event.preventDefault();

        setMessage("");
        setMessageType("");

        if (!username.trim() || !password.trim()) {
          setMessage("Username dan password wajib diisi.");
          setMessageType("error");
          return;
        }

        if (typeof google === "undefined" || !google.script || !google.script.run) {
          setMessage("API Managerku.id belum tersedia. Cek MANAGERKU_CONFIG.apiUrl.");
          setMessageType("error");
          return;
        }

        setLoading(true);

        google.script.run
          .withSuccessHandler(function(response) {
            setLoading(false);

            if (response && response.success) {
              if (remember) {
                localStorage.setItem(USERNAME_KEY, username.trim());
              } else {
                localStorage.removeItem(USERNAME_KEY);
              }

              setMessage(response.message || "Login berhasil.");
              setMessageType("success");
              setLoggedInUser(response.user);
              saveSession(response.user);

              setTimeout(function() {
                setCurrentPage("dashboard");
              }, 500);

            } else {
              setMessage((response && response.message) || "Username atau password salah.");
              setMessageType("error");
            }
          })
          .withFailureHandler(function(error) {
            setLoading(false);
            setMessage((error && error.message) || "Terjadi error pada server.");
            setMessageType("error");
          })
          .loginUser({
            username: username.trim(),
            password: password,
            remember: remember
          });
      }

      if (currentPage === "dashboard") {
        return (
          <DashboardApp
            user={loggedInUser}
            onLogout={() => {
              clearSession();
              setCurrentPage("login");
              setLoggedInUser(null);
              setPassword("");
              setMessage("");
              setMessageType("");
            }}
          />
        );
      }

      return (
        <main className="relative min-h-screen overflow-x-hidden bg-background text-on-background">
          <div className="absolute inset-0 pattern-bg pointer-events-none"></div>
          <div className="absolute -top-24 -right-24 h-72 w-72 sm:h-96 sm:w-96 rounded-full bg-primary/10 blur-3xl"></div>
          <div className="absolute -bottom-24 -left-24 h-72 w-72 sm:h-96 sm:w-96 rounded-full bg-secondary-container/30 blur-3xl"></div>

          <div className="relative z-10 flex min-h-screen items-center justify-center px-4 py-6 sm:px-6 sm:py-10 lg:px-8">
            <section className="grid w-full max-w-[1200px] overflow-hidden rounded-2xl border border-outline-variant/30 bg-surface-container-lowest shadow-xl md:min-h-[680px] md:grid-cols-2">

              <aside className="relative hidden overflow-hidden bg-primary p-8 md:flex md:flex-col md:justify-between lg:p-12">
                <div className="absolute inset-0 opacity-40">
                  <img
                    className="h-full w-full object-cover"
                    alt="Clean modern laundry room"
                    src="https://images.unsplash.com/photo-1626806787461-102c1bfaaea1?auto=format&fit=crop&w=1200&q=80"
                  />
                </div>

                <div className="absolute inset-0 bg-gradient-to-br from-primary/95 to-primary/40"></div>

                <div className="relative z-10">
                  <div className="flex items-center gap-2">
                    <span className="material-symbols-outlined text-[32px] text-on-primary">
                      local_laundry_service
                    </span>
                    <span className="font-h2 text-2xl font-bold tracking-tight text-on-primary">
                      Laundryku
                    </span>
                  </div>

                  <div className="mt-1 flex items-center gap-1 opacity-80">
                    <span className="text-[10px] font-medium uppercase tracking-[0.2em] text-on-primary">
                      supported by MJ
                    </span>
                  </div>
                </div>

                <div className="relative z-10">
                  <h1 className="mb-4 max-w-md font-h1 text-3xl font-extrabold leading-tight tracking-tight text-on-primary lg:text-[32px]">
                    The future of laundry management is here.
                  </h1>
                  <p className="max-w-md text-base leading-relaxed text-on-primary/90 lg:text-lg">
                    Experience the most efficient way to track orders, manage customers, and scale your laundry business with precision.
                  </p>
                </div>

                <div className="relative z-10 flex gap-6">
                  <div className="flex flex-col">
                    <span className="font-h3 text-2xl font-bold text-on-primary">15k+</span>
                    <span className="text-[11px] font-medium uppercase tracking-widest text-on-primary/70">
                      Orders Processed
                    </span>
                  </div>

                  <div className="h-10 w-px self-center bg-on-primary/20"></div>

                  <div className="flex flex-col">
                    <span className="font-h3 text-2xl font-bold text-on-primary">99.9%</span>
                    <span className="text-[11px] font-medium uppercase tracking-widest text-on-primary/70">
                      Uptime Reliable
                    </span>
                  </div>
                </div>
              </aside>

              <section className="flex min-h-[calc(100vh-48px)] flex-col justify-center bg-surface-container-lowest px-5 py-8 sm:min-h-0 sm:px-8 sm:py-10 md:px-8 lg:px-12 lg:py-12">

                <div className="mb-7 flex flex-col items-center md:hidden">
                  <div className="flex items-center justify-center gap-2">
                    <span className="material-symbols-outlined text-[34px] text-primary">
                      local_laundry_service
                    </span>
                    <span className="font-h2 text-2xl font-bold tracking-tight text-primary">
                      Laundryku
                    </span>
                  </div>

                  <div className="mt-1 flex items-center justify-center gap-1 opacity-70">
                    <span className="text-[10px] font-medium uppercase tracking-[0.2em] text-primary">
                      supported by MJ
                    </span>
                  </div>
                </div>

                <div className="mb-8 text-center md:text-left">
                  <h2 className="mb-2 font-h1 text-[32px] font-extrabold leading-tight tracking-tight text-on-background sm:text-[36px] lg:text-[40px]">
                    Welcome back
                  </h2>
                  <p className="text-sm leading-relaxed text-on-surface-variant sm:text-base">
                    Please enter your details to access your dashboard.
                  </p>
                </div>

                {message && (
                  <div
                    className={
                      "mb-5 rounded-xl border px-4 py-3 text-sm " +
                      (messageType === "success"
                        ? "border-green-200 bg-green-50 text-green-700"
                        : "border-red-200 bg-red-50 text-red-700")
                    }
                  >
                    {message}
                  </div>
                )}

                <form className="space-y-6" onSubmit={handleSubmit}>
                  <div className="space-y-2">
                    <label className="block text-sm font-semibold tracking-[0.12em] text-on-surface-variant" htmlFor="username">
                      USERNAME
                    </label>

                    <div className="relative">
                      <span className="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">
                        person
                      </span>

                      <input
                        id="username"
                        type="text"
                        value={username}
                        onChange={(event) => setUsername(event.target.value)}
                        placeholder="Enter your username"
                        autoComplete="username"
                        className="h-14 w-full rounded-lg border border-outline-variant bg-surface-container-low py-4 pl-12 pr-4 text-base outline-none transition-all focus:border-primary focus:ring-2 focus:ring-primary/30"
                      />
                    </div>
                  </div>

                  <div className="space-y-2">
                    <div className="flex items-center justify-between gap-4">
                      <label className="block text-sm font-semibold tracking-[0.12em] text-on-surface-variant" htmlFor="password">
                        PASSWORD
                      </label>

                      <button
                        type="button"
                        className="text-xs font-medium text-primary transition-all hover:underline sm:text-sm"
                        onClick={() => alert("Hubungi admin untuk reset password.")}
                      >
                        Forgot Password?
                      </button>
                    </div>

                    <div className="relative">
                      <span className="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">
                        lock
                      </span>

                      <input
                        id="password"
                        type={showPassword ? "text" : "password"}
                        value={password}
                        onChange={(event) => setPassword(event.target.value)}
                        placeholder="••••••••"
                        autoComplete="current-password"
                        className="h-14 w-full rounded-lg border border-outline-variant bg-surface-container-low py-4 pl-12 pr-12 text-base outline-none transition-all focus:border-primary focus:ring-2 focus:ring-primary/30"
                      />

                      <button
                        type="button"
                        className="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant transition-colors hover:text-on-surface-variant"
                        onClick={() => setShowPassword(!showPassword)}
                        aria-label="Toggle password visibility"
                      >
                        <span className="material-symbols-outlined">
                          {showPassword ? "visibility_off" : "visibility"}
                        </span>
                      </button>
                    </div>
                  </div>

                  <div className="flex items-center gap-2">
                    <input
                      id="remember"
                      type="checkbox"
                      checked={remember}
                      onChange={(event) => setRemember(event.target.checked)}
                      className="h-5 w-5 cursor-pointer rounded border-outline-variant text-primary focus:ring-primary"
                    />

                    <label className="cursor-pointer text-sm text-on-surface-variant" htmlFor="remember">
                      Remember me
                    </label>
                  </div>

                  <button
                    type="submit"
                    disabled={loading}
                    className="flex h-14 w-full items-center justify-center gap-2 rounded-lg bg-primary px-4 font-h3 text-lg font-bold text-on-primary shadow-lg transition-all hover:bg-primary-container hover:shadow-primary/20 active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-70"
                  >
                    {loading ? "Checking..." : "Login to Dashboard"}

                    <span className={"material-symbols-outlined " + (loading ? "spin" : "")}>
                      {loading ? "progress_activity" : "arrow_forward"}
                    </span>
                  </button>
                </form>
              </section>
            </section>
          </div>

          <footer className="relative z-10 px-4 pb-6 text-center text-xs font-medium text-outline/60 sm:text-sm md:fixed md:bottom-6 md:left-1/2 md:w-full md:-translate-x-1/2 md:px-6 md:pb-0">
            © 2026 Laundryku Laundry Management Systems. All rights reserved.
            <span className="mx-2 hidden sm:inline">|</span>
            <a className="block transition-colors hover:text-primary sm:inline" href="#">
              Privacy Policy
            </a>
            <span className="mx-2 hidden sm:inline">|</span>
            <a className="block transition-colors hover:text-primary sm:inline" href="#">
              Terms of Service
            </a>
          </footer>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<LoginApp />);
  </script>
</body>
